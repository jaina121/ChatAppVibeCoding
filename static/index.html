<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Real-time Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
            --page-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --surface: #ffffff;
            --surface-2: #f9f9f9;
            --sidebar-bg: #f5f5f5;
            --text-main: #1f2937;
            --text-soft: #666666;
            --border-color: #dddddd;
            --input-bg: #ffffff;
            --input-border: #dddddd;
            --accent: #667eea;
            --accent-2: #764ba2;
            --accent-contrast: #ffffff;
            --message-incoming: #e8e8e8;
            --message-incoming-text: #333333;
            --status-online-bg: #d4edda;
            --status-online-text: #155724;
            --status-offline-bg: #f8d7da;
            --status-offline-text: #721c24;
            --scrollbar-track: #f1f1f1;
            --scrollbar-thumb: #888888;
            --scrollbar-thumb-hover: #555555;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        :root[data-theme='dark'] {
            color-scheme: dark;
            --page-bg: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            --surface: #111827;
            --surface-2: #0f172a;
            --sidebar-bg: #0b1220;
            --text-main: #f3f4f6;
            --text-soft: #9ca3af;
            --border-color: #243244;
            --input-bg: #0f172a;
            --input-border: #243244;
            --accent: #7c8cff;
            --accent-2: #9b7cff;
            --accent-contrast: #ffffff;
            --message-incoming: #1f2937;
            --message-incoming-text: #e5e7eb;
            --status-online-bg: #123222;
            --status-online-text: #8ee0a4;
            --status-offline-bg: #341b22;
            --status-offline-text: #ffb0ba;
            --scrollbar-track: #0f172a;
            --scrollbar-thumb: #4b5563;
            --scrollbar-thumb-hover: #6b7280;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: var(--surface);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
        }

        .sidebar-header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .sidebar-header h2 {
            margin-bottom: 0;
            font-size: 18px;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            color: white;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.28);
        }

        .register-form {
            display: flex;
            gap: 5px;
        }

        .register-form input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .register-form button {
            padding: 8px 15px;
            background: var(--surface);
            color: var(--accent);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .register-form button:hover {
            background: var(--surface-2);
        }

        /* Login/Logout Styles */
        .user-session {
            padding: 15px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .user-session.active {
            display: flex;
        }

        .user-info {
            padding: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }

        .logout-btn {
            padding: 8px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background: var(--surface);
            border-bottom: 1px solid var(--border-color);
        }

        .login-form.hidden {
            display: none;
        }

        .login-form input {
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            font-size: 13px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .login-form button {
            padding: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: var(--accent-contrast);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .login-form button:hover {
            opacity: 0.9;
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-soft);
            text-align: center;
            margin-top: -5px;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px;
            margin: 5px 0;
            background: var(--surface);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            color: var(--text-main);
        }

        .user-item:hover {
            background: var(--surface-2);
        }

        .user-item.active {
            background: var(--accent);
            color: white;
            border-left-color: var(--accent-2);
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--surface-2);
        }

        .chat-header h3 {
            color: var(--text-main);
            font-size: 18px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--surface);
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .message.received {
            background: var(--message-incoming);
            color: var(--message-incoming-text);
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .message-reactions {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .reaction-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .reaction-button {
            border: 1px solid var(--border-color);
            background: var(--surface);
            color: var(--text-main);
            border-radius: 999px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .reaction-button:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .reaction-button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .reaction-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 12px;
            opacity: 0.9;
        }

        .reaction-pill {
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(127, 127, 127, 0.12);
        }

        .reaction-picker {
            position: fixed;
            z-index: 50;
            display: none;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .reaction-picker.open {
            display: flex;
        }

        .reaction-picker .reaction-button {
            min-width: 34px;
            height: 34px;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 16px;
        }

        .message {
            position: relative;
            cursor: default;
        }

        .message.hint::after {
            content: 'Double click to react';
            position: absolute;
            top: -18px;
            right: 10px;
            font-size: 10px;
            color: var(--text-soft);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        .message:hover.hint::after {
            opacity: 1;
        }

        .chat-input {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: var(--surface-2);
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .chat-input button {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: var(--accent-contrast);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input button:hover {
            opacity: 0.9;
        }

        .welcome-message {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-soft);
            font-size: 18px;
        }

        .status {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: var(--text-soft);
            border-top: 1px solid var(--border-color);
        }

        .status.online {
            background: var(--status-online-bg);
            color: var(--status-online-text);
        }

        .status.offline {
            background: var(--status-offline-bg);
            color: var(--status-offline-text);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }

            .users-list {
                display: flex;
                overflow-x: auto;
                padding: 10px;
            }

            .user-item {
                flex-shrink: 0;
                min-width: 120px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-inner">
                    <h2>💬 ChatApp</h2>
                    <button type="button" class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
                </div>
            </div>
            
            <!-- Login Section - Shows when not logged in -->
            <div class="login-form" id="login-section">
                <form onsubmit="handleAuthForm(event)">
                    <input type="text" id="username-input" placeholder="Username" required>
                    <button type="submit" id="auth-btn">Login</button>
                    <div class="form-hint" id="form-hint">Press Join to login or register</div>
                </form>
            </div>
            
            <!-- User Session Section - Shows when logged in -->
            <div class="user-session" id="user-session">
                <div class="user-info">
                    👤 <span id="current-username"></span>
                </div>
                <button class="logout-btn" onclick="logoutUser()">Logout</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search users...">
            </div>
            <div class="users-list" id="users-list"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h3 id="chat-title">Select a user to chat</h3>
            </div>
            <div class="chat-body" id="messages-container"></div>
            <div class="status" id="status">Not connected</div>
            <div class="chat-input" id="input-section" style="display: none;">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedUser = null;
        let ws = null;
        let wsReconnectTimer = null;
        const apiBase = window.location.origin;
        const conversationCacheKey = 'chatappConversationHistory';
        const themeStorageKey = 'chatappTheme';
        const reactionOptions = ['👍', '❤️', '😂', '😮', '🔥'];
        let activeReactionPicker = null;
        let activeReactionMessageId = null;

        function applyTheme(theme) {
            const resolvedTheme = theme === 'dark' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', resolvedTheme);
            localStorage.setItem(themeStorageKey, resolvedTheme);

            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.textContent = resolvedTheme === 'dark' ? '☀️' : '🌙';
                themeToggle.title = resolvedTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        }

        function restoreTheme() {
            const savedTheme = localStorage.getItem(themeStorageKey);
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            restoreTheme();

            // Try to restore session from localStorage
            restoreSession();
            
            // If no session, show login form
            if (!currentUser) {
                showLoginForm();
            } else {
                showUserSession();
                connectWebSocket();
                loadUsers();
                setStatus('Connected', 'online');
            }
        });

        // Restore session from localStorage
        function restoreSession() {
            const savedUser = localStorage.getItem('chatappUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    console.log('Session restored for:', currentUser.username);
                } catch (e) {
                    console.error('Failed to restore session:', e);
                    localStorage.removeItem('chatappUser');
                }
            }
        }

        // Save session to localStorage
        function saveSession(user) {
            localStorage.setItem('chatappUser', JSON.stringify(user));
        }

        function getConversationKey(userAId, userBId) {
            return [userAId, userBId].sort((a, b) => a - b).join('_');
        }

        function loadConversationCache() {
            try {
                return JSON.parse(localStorage.getItem(conversationCacheKey) || '{}');
            } catch (e) {
                console.error('Failed to load conversation cache:', e);
                return {};
            }
        }

        function saveConversationCache(cache) {
            localStorage.setItem(conversationCacheKey, JSON.stringify(cache));
        }

        function cacheConversationMessage(message) {
            if (!currentUser || !message || message.sender_id == null || message.receiver_id == null) {
                return;
            }

            const conversationKey = getConversationKey(message.sender_id, message.receiver_id);
            const cache = loadConversationCache();
            cache[conversationKey] = cache[conversationKey] || [];

            const alreadyExists = cache[conversationKey].some((item) =>
                item.id && message.id && item.id === message.id
            );

            if (!alreadyExists) {
                cache[conversationKey].push({
                    id: message.id || `${message.sender_id}_${message.receiver_id}_${message.created_at || message.timestamp}`,
                    sender_id: message.sender_id,
                    receiver_id: message.receiver_id,
                    content: message.content,
                    created_at: message.created_at || message.timestamp,
                    sender_username: message.sender_username,
                    reactions: message.reactions || []
                });
                saveConversationCache(cache);
            }
        }

        function getMessageDedupKey(message) {
            return message.id != null
                ? `id:${message.id}`
                : `fallback:${message.sender_id}_${message.receiver_id}_${message.created_at || message.timestamp}_${message.content}`;
        }

        function renderConversationMessages(messages) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            messages.forEach((msg) => displayMessage(msg, true));
        }

        function ensureReactionPicker() {
            let picker = document.getElementById('reaction-picker');
            if (picker) {
                return picker;
            }

            picker = document.createElement('div');
            picker.id = 'reaction-picker';
            picker.className = 'reaction-picker';
            document.body.appendChild(picker);

            document.addEventListener('click', (event) => {
                if (activeReactionPicker && !activeReactionPicker.contains(event.target)) {
                    closeReactionPicker();
                }
            });

            window.addEventListener('scroll', () => closeReactionPicker(), true);
            window.addEventListener('resize', () => closeReactionPicker());
            return picker;
        }

        function closeReactionPicker() {
            if (activeReactionPicker) {
                activeReactionPicker.classList.remove('open');
            }

            activeReactionPicker = null;
            activeReactionMessageId = null;
        }

        function openReactionPicker(messageElement, messageId, currentReaction = null) {
            if (!messageId) {
                return;
            }

            const picker = ensureReactionPicker();
            picker.innerHTML = reactionOptions.map((reaction) => `
                <button type="button" class="reaction-button ${currentReaction === reaction ? 'active' : ''}" onclick="reactToMessage(${messageId}, '${reaction}')">${reaction}</button>
            `).join('');

            const rect = messageElement.getBoundingClientRect();
            const pickerWidth = 260;
            const pickerHeight = 52;
            const top = Math.max(12, rect.top - pickerHeight - 10);
            const left = Math.min(window.innerWidth - pickerWidth - 12, Math.max(12, rect.left + rect.width / 2 - pickerWidth / 2));

            picker.style.top = `${top}px`;
            picker.style.left = `${left}px`;
            picker.classList.add('open');
            activeReactionPicker = picker;
            activeReactionMessageId = messageId;
        }

        function groupReactions(reactions) {
            const grouped = {};
            (reactions || []).forEach((reaction) => {
                grouped[reaction.reaction] = grouped[reaction.reaction] || [];
                grouped[reaction.reaction].push(reaction);
            });
            return grouped;
        }

        function getCurrentUserReaction(reactions) {
            const mine = (reactions || []).find((reaction) => reaction.user_id === currentUser?.id);
            return mine ? mine.reaction : null;
        }

        function renderReactionSummary(reactions) {
            if (!reactions || !reactions.length) {
                return '';
            }

            const grouped = groupReactions(reactions);
            return Object.entries(grouped)
                .map(([reaction, items]) => `<span class="reaction-pill">${reaction} ${items.length}</span>`)
                .join('');
        }

        async function reactToMessage(messageId, reaction) {
            if (!currentUser || !messageId) return;

            try {
                closeReactionPicker();
                const response = await fetch(`${apiBase}/api/messages/${messageId}/reactions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        reaction
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Failed to add reaction');
                }

                if (selectedUser) {
                    await selectUser(selectedUser);
                }
            } catch (error) {
                console.error('Error reacting to message:', error);
                alert('Could not add reaction: ' + error.message);
            }
        }

        // Show login form
        function showLoginForm() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('user-session').classList.remove('active');
            document.getElementById('username-input').value = '';
            document.getElementById('username-input').focus();
        }

        // Show user session
        function showUserSession() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('user-session').classList.add('active');
            document.getElementById('current-username').textContent = currentUser.username;
        }

        // Handle both login and registration
        async function handleAuthForm(e) {
            e.preventDefault();
            const username = document.getElementById('username-input').value.trim();
            
            if (!username) {
                alert('Please enter a username');
                return;
            }

            try {
                // First try to login (user exists)
                let response = await fetch(`${apiBase}/api/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                if (response.ok) {
                    // User exists - login
                    const user = await response.json();
                    loginUser(user);
                } else if (response.status === 401) {
                    // User doesn't exist - try to register
                    response = await fetch(`${apiBase}/api/users/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username })
                    });

                    if (response.ok) {
                        const user = await response.json();
                        loginUser(user);
                    } else {
                        alert('This username is taken. Please try another.');
                    }
                } else {
                    alert('Error: ' + (await response.json()).detail);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Login user (after checking if exists or registering)
        function loginUser(user) {
            currentUser = user;
            saveSession(user);  // Save to localStorage
            document.getElementById('username-input').value = '';
            showUserSession();
            connectWebSocket();
            loadUsers();
            setStatus('Connected', 'online');
            console.log('User logged in:', user.username);
        }

        // Logout user
        function logoutUser() {
            if (wsReconnectTimer) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
            
            currentUser = null;
            selectedUser = null;
            localStorage.removeItem('chatappUser');
            document.getElementById('messages-container').innerHTML = '';
            document.getElementById('chat-title').textContent = 'Select a user to chat';
            document.getElementById('input-section').style.display = 'none';
            showLoginForm();
            setStatus('Not connected', 'offline');
            console.log('User logged out');
        }

        // Connect WebSocket
        function connectWebSocket() {
            if (!currentUser) return;

            if (wsReconnectTimer) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/${currentUser.id}`);

            ws.onopen = () => setStatus('Connected', 'online');
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    // Only display incoming WS messages if they belong to the currently open conversation
                    const isRelevantConversation = selectedUser && (
                        (data.sender_id === currentUser.id && data.receiver_id === selectedUser.id) ||
                        (data.sender_id === selectedUser.id && data.receiver_id === currentUser.id)
                    );

                    if (isRelevantConversation) {
                        displayMessage(data, false);
                    } else {
                        // Message for another conversation — ignore or handle notifications here
                        console.log('WS message for other conversation; ignoring in current view.', data);
                    }
                } else if (data.type === 'reaction' && selectedUser) {
                    selectUser(selectedUser);
                }
            };
            
            ws.onerror = () => setStatus('Connection error', 'offline');
            ws.onclose = () => {
                setStatus('Disconnected', 'offline');
                if (currentUser) {
                    wsReconnectTimer = setTimeout(() => {
                        connectWebSocket();
                    }, 1500);
                }
            };
        }

        // Load users
        async function loadUsers(search = '') {
            try {
                const url = search 
                    ? `${apiBase}/api/users?search=${search}` 
                    : `${apiBase}/api/users`;
                const response = await fetch(url);
                const users = await response.json();
                
                const container = document.getElementById('users-list');
                container.innerHTML = '';
                
                users.forEach(user => {
                    if (currentUser && user.id !== currentUser.id) {
                        const div = document.createElement('div');
                        div.className = `user-item ${selectedUser?.id === user.id ? 'active' : ''}`;
                        div.textContent = user.username;
                        div.onclick = () => selectUser(user);
                        container.appendChild(div);
                    }
                });
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        // Select user for chat
        async function selectUser(user) {
            selectedUser = user;
            closeReactionPicker();
            document.getElementById('chat-title').textContent = `Chat with ${user.username}`;
            document.getElementById('input-section').style.display = 'flex';
            const conversationKey = getConversationKey(currentUser.id, user.id);
            const cache = loadConversationCache();
            const cachedMessages = cache[conversationKey] || [];

            document.getElementById('messages-container').innerHTML = '';

            if (cachedMessages.length > 0) {
                renderConversationMessages(cachedMessages.slice().sort((a, b) => Number(a.created_at || a.timestamp) - Number(b.created_at || b.timestamp)));
            }
            
            // Load chat history
            try {
                const response = await fetch(`${apiBase}/api/messages`);
                const messages = await response.json();

                // Ensure messages are shown oldest -> newest
                messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                const conversationMessages = [];
                const mergedMessages = new Map();

                cachedMessages.forEach((msg) => {
                    mergedMessages.set(getMessageDedupKey(msg), msg);
                });

                messages.forEach(msg => {
                    if ((msg.sender_id === currentUser.id && msg.receiver_id === user.id) ||
                        (msg.sender_id === user.id && msg.receiver_id === currentUser.id)) {
                        conversationMessages.push(msg);
                        mergedMessages.set(getMessageDedupKey(msg), msg);
                    }
                });

                document.getElementById('messages-container').innerHTML = '';
                Array.from(mergedMessages.values())
                    .sort((a, b) => Number(a.created_at || a.timestamp) - Number(b.created_at || b.timestamp))
                    .forEach((msg) => displayMessage(msg, true));

                cache[conversationKey] = conversationMessages;
                saveConversationCache(cache);
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function sendMessageViaHttp(content) {
            const response = await fetch(`${apiBase}/api/messages?sender_id=${currentUser.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    receiver_id: selectedUser.id,
                    content
                })
            });

            if (!response.ok) {
                const errorPayload = await response.json().catch(() => ({}));
                throw new Error(errorPayload.detail || 'Failed to send message');
            }

            const result = await response.json();
            const optimisticMessage = {
                id: result.message_id,
                sender_id: currentUser.id,
                receiver_id: selectedUser.id,
                sender_username: currentUser.username,
                content,
                created_at: Date.now(),
                timestamp: Date.now(),
                reactions: []
            };

            const isSameConversationOpen = selectedUser && selectedUser.id === optimisticMessage.receiver_id;
            if (isSameConversationOpen) {
                displayMessage(optimisticMessage, false);
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            
            if (!content || !selectedUser || !currentUser) return;

            input.value = '';

            const canUseWebSocket = ws && ws.readyState === WebSocket.OPEN;

            if (canUseWebSocket) {
                try {
                    ws.send(JSON.stringify({
                        content,
                        receiver_id: selectedUser.id
                    }));
                    return;
                } catch (error) {
                    console.error('WebSocket send failed, falling back to HTTP:', error);
                }
            }

            try {
                await sendMessageViaHttp(content);
            } catch (error) {
                input.value = content;
                alert(`Failed to send message: ${error.message}`);
            }
        }

        // Display message
        function displayMessage(msg, isHistory = false) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            
            const isSent = msg.sender_id === currentUser.id;
            const reactions = Array.isArray(msg.reactions) ? msg.reactions : [];
            const myReaction = getCurrentUserReaction(reactions);
            const messageId = msg.id ? Number(msg.id) : null;
            div.className = `message ${isSent ? 'sent' : 'received'} ${messageId ? 'hint' : ''}`;
            if (messageId) {
                div.dataset.messageId = String(messageId);
            }
            
            const time = formatMessageTime(msg.created_at || msg.timestamp);
            div.innerHTML = `
                <div class="message-sender">${msg.sender_username}</div>
                <div class="message-text">${msg.content}</div>
                <div class="message-time">${time}</div>
                <div class="message-reactions">
                    <div class="reaction-summary">${renderReactionSummary(reactions)}</div>
                </div>
            `;

            if (messageId) {
                div.addEventListener('dblclick', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    openReactionPicker(div, messageId, myReaction);
                });
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            cacheConversationMessage(msg);
        }

        // Format message time in a fixed timezone so relogin does not change the displayed hour
        function formatMessageTime(timestamp) {
            const dateObj = new Date(Number(timestamp));
            return new Intl.DateTimeFormat('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Bishkek'
            }).format(dateObj);
        }

        // Search users
        document.getElementById('search-users')?.addEventListener('input', (e) => {
            loadUsers(e.target.value);
        });

        // Send on Enter
        document.getElementById('message-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Set status
        function setStatus(text, className) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = `status ${className}`;
        }
    </script>
</body>
</html>
