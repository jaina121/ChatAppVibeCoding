<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Real-time Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .register-form {
            display: flex;
            gap: 5px;
        }

        .register-form input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
        }

        .register-form button {
            padding: 8px 15px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .register-form button:hover {
            background: #f0f0f0;
        }

        /* Login/Logout Styles */
        .user-session {
            padding: 15px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .user-session.active {
            display: flex;
        }

        .user-info {
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }

        .logout-btn {
            padding: 8px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .login-form.hidden {
            display: none;
        }

        .login-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
        }

        .login-form button {
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .login-form button:hover {
            opacity: 0.9;
        }

        .form-hint {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: -5px;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .user-item:hover {
            background: #e8e8e8;
        }

        .user-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            background: #f9f9f9;
        }

        .chat-header h3 {
            color: #333;
            font-size: 18px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.sent {
            background: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .message.received {
            background: #e8e8e8;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .chat-input {
            padding: 20px;
            border-top: 1px solid #ddd;
            background: #f9f9f9;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .chat-input button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input button:hover {
            opacity: 0.9;
        }

        .welcome-message {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        .status {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #ddd;
        }

        .status.online {
            background: #d4edda;
            color: #155724;
        }

        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }

            .users-list {
                display: flex;
                overflow-x: auto;
                padding: 10px;
            }

            .user-item {
                flex-shrink: 0;
                min-width: 120px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>💬 ChatApp</h2>
            </div>
            
            <!-- Login Section - Shows when not logged in -->
            <div class="login-form" id="login-section">
                <form onsubmit="handleAuthForm(event)">
                    <input type="text" id="username-input" placeholder="Username" required>
                    <button type="submit" id="auth-btn">Login</button>
                    <div class="form-hint" id="form-hint">Press Join to login or register</div>
                </form>
            </div>
            
            <!-- User Session Section - Shows when logged in -->
            <div class="user-session" id="user-session">
                <div class="user-info">
                    👤 <span id="current-username"></span>
                </div>
                <button class="logout-btn" onclick="logoutUser()">Logout</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="search-users" placeholder="Search users...">
            </div>
            <div class="users-list" id="users-list"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h3 id="chat-title">Select a user to chat</h3>
            </div>
            <div class="chat-body" id="messages-container"></div>
            <div class="status" id="status">Not connected</div>
            <div class="chat-input" id="input-section" style="display: none;">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedUser = null;
        let ws = null;
        const apiBase = window.location.origin;

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            // Try to restore session from localStorage
            restoreSession();
            
            // If no session, show login form
            if (!currentUser) {
                showLoginForm();
            } else {
                showUserSession();
                connectWebSocket();
                loadUsers();
                setStatus('Connected', 'online');
            }
        });

        // Restore session from localStorage
        function restoreSession() {
            const savedUser = localStorage.getItem('chatappUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    console.log('Session restored for:', currentUser.username);
                } catch (e) {
                    console.error('Failed to restore session:', e);
                    localStorage.removeItem('chatappUser');
                }
            }
        }

        // Save session to localStorage
        function saveSession(user) {
            localStorage.setItem('chatappUser', JSON.stringify(user));
        }

        // Show login form
        function showLoginForm() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('user-session').classList.remove('active');
            document.getElementById('username-input').value = '';
            document.getElementById('username-input').focus();
        }

        // Show user session
        function showUserSession() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('user-session').classList.add('active');
            document.getElementById('current-username').textContent = currentUser.username;
        }

        // Handle both login and registration
        async function handleAuthForm(e) {
            e.preventDefault();
            const username = document.getElementById('username-input').value.trim();
            
            if (!username) {
                alert('Please enter a username');
                return;
            }

            try {
                // First try to login (user exists)
                let response = await fetch(`${apiBase}/api/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                if (response.ok) {
                    // User exists - login
                    const user = await response.json();
                    loginUser(user);
                } else if (response.status === 401) {
                    // User doesn't exist - try to register
                    response = await fetch(`${apiBase}/api/users/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username })
                    });

                    if (response.ok) {
                        const user = await response.json();
                        loginUser(user);
                    } else {
                        alert('This username is taken. Please try another.');
                    }
                } else {
                    alert('Error: ' + (await response.json()).detail);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Login user (after checking if exists or registering)
        function loginUser(user) {
            currentUser = user;
            saveSession(user);  // Save to localStorage
            document.getElementById('username-input').value = '';
            showUserSession();
            connectWebSocket();
            loadUsers();
            setStatus('Connected', 'online');
            console.log('User logged in:', user.username);
        }

        // Logout user
        function logoutUser() {
            if (ws) {
                ws.close();
                ws = null;
            }
            
            currentUser = null;
            selectedUser = null;
            localStorage.removeItem('chatappUser');
            document.getElementById('messages-container').innerHTML = '';
            document.getElementById('chat-title').textContent = 'Select a user to chat';
            document.getElementById('input-section').style.display = 'none';
            showLoginForm();
            setStatus('Not connected', 'offline');
            console.log('User logged out');
        }

        // Connect WebSocket
        function connectWebSocket() {
            if (!currentUser) return;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/${currentUser.id}`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    // Only display incoming WS messages if they belong to the currently open conversation
                    const isRelevantConversation = selectedUser && (
                        (data.sender_id === currentUser.id && data.receiver_id === selectedUser.id) ||
                        (data.sender_id === selectedUser.id && data.receiver_id === currentUser.id)
                    );

                    if (isRelevantConversation) {
                        displayMessage(data, false);
                    } else {
                        // Message for another conversation — ignore or handle notifications here
                        console.log('WS message for other conversation; ignoring in current view.', data);
                    }
                }
            };
            
            ws.onerror = () => setStatus('Connection error', 'offline');
            ws.onclose = () => setStatus('Disconnected', 'offline');
        }

        // Load users
        async function loadUsers(search = '') {
            try {
                const url = search 
                    ? `${apiBase}/api/users?search=${search}` 
                    : `${apiBase}/api/users`;
                const response = await fetch(url);
                const users = await response.json();
                
                const container = document.getElementById('users-list');
                container.innerHTML = '';
                
                users.forEach(user => {
                    if (currentUser && user.id !== currentUser.id) {
                        const div = document.createElement('div');
                        div.className = `user-item ${selectedUser?.id === user.id ? 'active' : ''}`;
                        div.textContent = user.username;
                        div.onclick = () => selectUser(user);
                        container.appendChild(div);
                    }
                });
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        // Select user for chat
        async function selectUser(user) {
            selectedUser = user;
            document.getElementById('chat-title').textContent = `Chat with ${user.username}`;
            document.getElementById('input-section').style.display = 'flex';
            document.getElementById('messages-container').innerHTML = '';
            
            // Load chat history
            try {
                const response = await fetch(`${apiBase}/api/messages`);
                const messages = await response.json();

                // Ensure messages are shown oldest -> newest
                messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                messages.forEach(msg => {
                    if ((msg.sender_id === currentUser.id && msg.receiver_id === user.id) ||
                        (msg.sender_id === user.id && msg.receiver_id === currentUser.id)) {
                        displayMessage(msg, true);
                    }
                });
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            
            if (!content || !selectedUser || !ws) return;
            
            ws.send(JSON.stringify({
                content,
                receiver_id: selectedUser.id
            }));
            
            input.value = '';
        }

        // Display message
        function displayMessage(msg, isHistory = false) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            
            const isSent = msg.sender_id === currentUser.id;
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            
            // Handle both Unix timestamp (ms) and ISO string formats
            const timestamp = msg.created_at || msg.timestamp;
            let dateObj;
            
            if (typeof timestamp === 'number') {
                // Unix timestamp in milliseconds (from API or WebSocket)
                dateObj = new Date(timestamp);
            } else {
                // ISO string format (legacy)
                dateObj = new Date(timestamp);
            }
            
            const time = new Intl.DateTimeFormat('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Bishkek'
            }).format(dateObj);
            div.innerHTML = `
                <div class="message-sender">${msg.sender_username}</div>
                ${msg.content}
                <div class="message-time">${time}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Search users
        document.getElementById('search-users')?.addEventListener('input', (e) => {
            loadUsers(e.target.value);
        });

        // Send on Enter
        document.getElementById('message-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Set status
        function setStatus(text, className) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = `status ${className}`;
        }
    </script>
</body>
</html>
